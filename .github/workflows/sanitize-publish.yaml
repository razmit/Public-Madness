name: Sanitize and publish to portfolio
on:
    push:
        branches:
            - main
        paths:
            - 'Windows/**/*.ps1'
            - 'Windows/Programming/DevOps/Learning/sanitize.py'
            - 'Windows/Programming/DevOps/Learning/sanitization-config.yaml'
    workflow_dispatch:
        
jobs:
    sanitize-and-publish:
        runs-on: ubuntu-latest
        
        steps:
            # =========== SANITIZE SCRIPTS ===========
            - name: Checkout private repository
              uses: actions/checkout@v4
              
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
                  
            - name: Install dependencies
              run: pip install pyyaml
              
            - name: Run sanitization script
              run: |
                echo "Sanitizing PowerShell scripts..."
                python Windows/Programming/DevOps/Learning/sanitized.py
                
            - name: Verify sanitized output
              run: |
                echo "Sanitized scripts in output directory:"
                ls -lh Windows/Programming/DevOps/Learning/sanitized_scripts/
            
            # =========== ORGANIZE AND PUBLISH TO PORTFOLIO ===========
            
            - name: Checkout portfolio repository
              uses: actions/checkout@v4
              with:
                  repository: razmit/Portfolio-Man
                  token: ${{ secrets.PORTFOLIO_PUSH_TOKEN }}
                  path: portfolio-repo
                  
            - name: Organize scripts by category
              run: |
                # Create category directories if they don't exist
                mkdir -p portfolio-repo/PowerShell/SharePoint-Administration
                mkdir -p portfolio-repo/PowerShell/Windows-Administration
                
                SANITIZED_DIR="Windows/Programming/DevOps/Learning/sanitized_scripts"
                
                echo "Organizing sanitized scripts into categories..."
                
                # SharePoint/PnP scripts. Look for PnP-related patterns in filenames
                for file in $SANITIZED_DIR/*.ps1; do
                  filename=$(basename $file)
                  
                  # Check if it is a SharePoint/PnP script
                  if echo "$filename" | grep -qE "(Lock-Source|Export-Site|Migration|VAAP|Perm|Mass_|Upload_files|Whitelist|Recreate|Export_all|Export_tenant|Detect_|Find_lost|Auto_migrate)"; then
                    echo " → SharePoint: $filename"
                    cp "$file" portfolio-repo/PowerShell/SharePoint-Administration/
                    
                  # Check if it's Windows administration
                  elif echo "$filename" | grep -qE "(basic_new_hire|AutomateVPN|Pin_program|Windows_)"; then
                    echo " → Windows Administration: $filename"
                    cp "$file" portfolio-repo/PowerShell/Windows-Administration/
                  
                  # By default, send to SharePoint since most are for that
                  else
                    echo " → Default (SharePoint): $filename"
                    cp "$file" portfolio-repo/PowerShell/SharePoint-Administration/
                  fi
                done
                
                echo ""
                echo "*/*/* Organization summary: */*/*"
                echo "SharePoint scripts:"
                ls -1 portfolio-repo/PowerShell/SharePoint-Administration/ | wc -L
                echo "Windows scripts:"
                ls -1 portfolio-repo/PowerShell/Windows-Administration/ | wc -L
              
            - name: Commit and push changes to portfolio
              run: |
                cd portfolio-repo
                
                git config user.name "Portfolio Bot"
                git config user.email "actions@github.com"
                
                git add PowerShell/
                
                if git diff --staged --quiet; then
                  echo "✅ No changes to commit."
                else
                  # Count the files for commit message
                  SHAREPOINT_COUNT=$(ls -1 PowerShell/SharePoint-Administration/*.ps1 2>/dev/null | wc -l)
                  WINDOWS_COUNT=$(ls -1 PowerShell/Windows-Administration/*.ps1 2>/dev/null | wc -l)
                  
                  git commit -m "Update PowerShell portfolio scripts: 
                    📁 SharePoint Admin: $SHAREPOINT_COUNT scripts
                    📁 Windows Admin: $WINDOWS_COUNT scripts
                    
                    Auto-sanitized and organized from original, private repository.
                    ← Source commit: ${{ github.sha }}
                    → Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
                    
                    git push
                    echo "✅ Changes pushed to Portfolio-Man!"
                fi
                
            # ========== ARTIFACT FOR VERIFICATION ==========
            - name: Upload sanitized scripts as artifact
              uses: actions/upload-artifact@v4
              with:
                  name: sanitized-scripts-${{ github.sha }}
                  path: Windows/Programming/DevOps/Learning/sanitized_scripts/
                  retention-days: 7