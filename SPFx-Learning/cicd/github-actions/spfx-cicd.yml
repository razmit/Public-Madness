# GitHub Actions Workflow for SPFx 1.22+
# This workflow builds and deploys SPFx solutions using the modern Heft toolchain
#
# RECOMMENDED: Use with Federated Identity (no secrets needed!)
# See SETUP-GUIDE.md for detailed instructions

name: SPFx CI/CD

on:
  # Trigger on push to main or develop branches
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - production

  # Trigger on pull request (build only, no deploy)
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'

# Permissions for federated identity (OIDC)
permissions:
  id-token: write
  contents: read

env:
  # Node version - CRITICAL for SPFx 1.22
  NODE_VERSION: '22.x'

  # Package name (update this!)
  PACKAGE_NAME: 'spfx-sample-webpart.sppkg'

jobs:
  # ============================================
  # JOB 1: BUILD
  # ============================================
  build:
    name: Build SPFx Solution
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js v22 (required for SPFx 1.22)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Display versions for debugging
      - name: Display Node/npm versions
        run: |
          node --version
          npm --version

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run linting (optional but recommended)
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      # Run tests (if you have them)
      - name: Run tests
        run: npm test -- --ci --coverage --passWithNoTests
        continue-on-error: true

      # Build the solution using Heft
      - name: Build SPFx solution
        run: npm run build
        env:
          NODE_ENV: production

      # Package the solution using Heft
      - name: Package SPFx solution
        run: npm run package

      # Upload .sppkg as artifact
      - name: Upload solution package
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          path: sharepoint/solution/*.sppkg
          retention-days: 30

  # ============================================
  # JOB 2: DEPLOY TO DEV
  # ============================================
  deploy-dev:
    name: Deploy to Dev
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: dev
      url: ${{ secrets.DEV_SITE_URL }}

    steps:
      # Download build artifact
      - name: Download solution package
        uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: ./solution

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install CLI for Microsoft 365
      - name: Install CLI for Microsoft 365
        run: npm install -g @pnp/cli-microsoft365

      # OPTION 1: Federated Identity (RECOMMENDED - No secrets!)
      - name: Login to Microsoft 365 (Federated)
        if: vars.USE_FEDERATED_IDENTITY == 'true'
        run: |
          m365 login \
            --authType identity \
            --userName ${{ secrets.M365_APP_ID }} \
            --password ${{ secrets.M365_TENANT_ID }}

      # OPTION 2: Certificate-based authentication (Fallback)
      - name: Login to Microsoft 365 (Certificate)
        if: vars.USE_FEDERATED_IDENTITY != 'true'
        run: |
          m365 login --authType certificate \
            --certificateBase64Encoded "${{ secrets.M365_CERTIFICATE }}" \
            --password "${{ secrets.M365_CERTIFICATE_PASSWORD }}" \
            --appId ${{ secrets.M365_APP_ID }} \
            --tenant ${{ secrets.M365_TENANT_ID }}

      # Upload to App Catalog
      - name: Upload to App Catalog
        run: |
          m365 spo app add \
            --filePath ./solution/${{ env.PACKAGE_NAME }} \
            --appCatalogScope tenant \
            --overwrite

      # Deploy the app
      - name: Deploy app
        run: |
          m365 spo app deploy \
            --name ${{ env.PACKAGE_NAME }} \
            --appCatalogScope tenant

      # Install on dev site (optional)
      - name: Install on Dev site
        if: secrets.DEV_SITE_URL != ''
        run: |
          m365 spo app install \
            --name ${{ env.PACKAGE_NAME }} \
            --siteUrl ${{ secrets.DEV_SITE_URL }}

      # Logout
      - name: Logout from Microsoft 365
        if: always()
        run: m365 logout

  # ============================================
  # JOB 3: DEPLOY TO PRODUCTION
  # ============================================
  deploy-production:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    environment:
      name: production
      url: ${{ secrets.PROD_TENANT_URL }}

    steps:
      # Download build artifact
      - name: Download solution package
        uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: ./solution

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install CLI for Microsoft 365
      - name: Install CLI for Microsoft 365
        run: npm install -g @pnp/cli-microsoft365

      # Login to Production (use separate credentials!)
      - name: Login to Microsoft 365 Production
        run: |
          m365 login --authType certificate \
            --certificateBase64Encoded "${{ secrets.M365_CERTIFICATE_PROD }}" \
            --password "${{ secrets.M365_CERTIFICATE_PASSWORD_PROD }}" \
            --appId ${{ secrets.M365_APP_ID_PROD }} \
            --tenant ${{ secrets.M365_TENANT_ID_PROD }}

      # Upload to Production App Catalog
      - name: Upload to Production App Catalog
        run: |
          m365 spo app add \
            --filePath ./solution/${{ env.PACKAGE_NAME }} \
            --appCatalogScope tenant \
            --overwrite

      # Deploy tenant-wide
      - name: Deploy to Production (Tenant-wide)
        run: |
          m365 spo app deploy \
            --name ${{ env.PACKAGE_NAME }} \
            --appCatalogScope tenant \
            --skipFeatureDeployment

      # Logout
      - name: Logout from Microsoft 365
        if: always()
        run: m365 logout

  # ============================================
  # JOB 4: BUILD REPORT (Runs on PR)
  # ============================================
  build-report:
    name: Build Report
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ SPFx build completed successfully! Ready for deployment after merge.'
            })
