# Azure DevOps Pipeline for SPFx 1.22+
# This pipeline builds and deploys SPFx solutions using the modern Heft toolchain

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - 'src/**'
      - 'config/**'
      - 'package.json'
    exclude:
      - 'README.md'
      - 'docs/**'

# Don't trigger on PR by default (can be changed)
pr: none

# Variables
variables:
  # Node version - CRITICAL for SPFx 1.22
  nodeVersion: '22.x'

  # SPFx package name (update this!)
  packageName: 'spfx-sample-webpart.sppkg'

  # Build configuration
  buildConfiguration: 'production'

# Stages
stages:
  # ============================================
  # STAGE 1: BUILD
  # ============================================
  - stage: Build
    displayName: 'Build SPFx Solution'
    jobs:
      - job: BuildJob
        displayName: 'Build and Package'
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          # Checkout code
          - checkout: self
            clean: true

          # Install Node.js v22 (REQUIRED for SPFx 1.22)
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(nodeVersion)

          # Display versions for debugging
          - script: |
              node --version
              npm --version
            displayName: 'Display Node/npm versions'

          # Restore npm packages
          - task: Npm@1
            displayName: 'npm install'
            inputs:
              command: 'custom'
              customCommand: 'install'
              workingDir: '$(Build.SourcesDirectory)'

          # Run ESLint (optional but recommended)
          - script: |
              npm run lint
            displayName: 'Run ESLint'
            continueOnError: true

          # Run tests (if you have them)
          - script: |
              npm test -- --ci --coverage
            displayName: 'Run Tests'
            continueOnError: true

          # Build the solution using Heft
          - script: |
              npm run build
            displayName: 'Build SPFx Solution (Heft)'
            env:
              NODE_ENV: production

          # Package the solution using Heft
          - script: |
              npm run package
            displayName: 'Package SPFx Solution (Heft)'

          # Copy .sppkg to staging directory
          - task: CopyFiles@2
            displayName: 'Copy Solution Package'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sharepoint/solution'
              Contents: '**/*.sppkg'
              TargetFolder: '$(Build.ArtifactStagingDirectory)'

          # Publish build artifacts
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'
              publishLocation: 'Container'

  # ============================================
  # STAGE 2: DEPLOY TO DEV
  # ============================================
  - stage: DeployDev
    displayName: 'Deploy to Dev'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployDevJob
        displayName: 'Deploy to Dev Environment'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                # Download build artifacts
                - download: current
                  artifact: drop

                # Install Node.js
                - task: NodeTool@0
                  displayName: 'Install Node.js'
                  inputs:
                    versionSpec: $(nodeVersion)

                # Install CLI for Microsoft 365
                - script: |
                    npm install -g @pnp/cli-microsoft365
                  displayName: 'Install CLI for Microsoft 365'

                # Login to Microsoft 365 using Certificate (recommended)
                # OPTION 1: Certificate-based authentication
                - script: |
                    m365 login --authType certificate \
                      --certificateBase64Encoded $(M365_CERTIFICATE) \
                      --password $(M365_CERTIFICATE_PASSWORD) \
                      --appId $(M365_APP_ID) \
                      --tenant $(M365_TENANT_ID)
                  displayName: 'Login to M365 (Certificate)'
                  env:
                    M365_CERTIFICATE: $(M365_CERTIFICATE)
                    M365_CERTIFICATE_PASSWORD: $(M365_CERTIFICATE_PASSWORD)
                    M365_APP_ID: $(M365_APP_ID)
                    M365_TENANT_ID: $(M365_TENANT_ID)

                # Upload and deploy to App Catalog
                - script: |
                    m365 spo app add \
                      --filePath $(Pipeline.Workspace)/drop/$(packageName) \
                      --appCatalogScope tenant \
                      --overwrite
                  displayName: 'Upload to App Catalog'

                - script: |
                    m365 spo app deploy \
                      --name $(packageName) \
                      --appCatalogScope tenant
                  displayName: 'Deploy App'

                # Optional: Install on specific site
                - script: |
                    m365 spo app install \
                      --name $(packageName) \
                      --siteUrl $(DEV_SITE_URL)
                  displayName: 'Install on Dev Site'
                  env:
                    DEV_SITE_URL: $(DEV_SITE_URL)
                  condition: and(succeeded(), ne(variables['DEV_SITE_URL'], ''))

                # Logout
                - script: |
                    m365 logout
                  displayName: 'Logout from M365'
                  condition: always()

  # ============================================
  # STAGE 3: DEPLOY TO PRODUCTION (with approval)
  # ============================================
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: DeployDev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        displayName: 'Deploy to Production Environment'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'production'  # Configure manual approval in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                # Download build artifacts
                - download: current
                  artifact: drop

                # Install Node.js
                - task: NodeTool@0
                  displayName: 'Install Node.js'
                  inputs:
                    versionSpec: $(nodeVersion)

                # Install CLI for Microsoft 365
                - script: |
                    npm install -g @pnp/cli-microsoft365
                  displayName: 'Install CLI for Microsoft 365'

                # Login to Microsoft 365
                - script: |
                    m365 login --authType certificate \
                      --certificateBase64Encoded $(M365_CERTIFICATE_PROD) \
                      --password $(M365_CERTIFICATE_PASSWORD_PROD) \
                      --appId $(M365_APP_ID_PROD) \
                      --tenant $(M365_TENANT_ID_PROD)
                  displayName: 'Login to M365 Production'
                  env:
                    M365_CERTIFICATE_PROD: $(M365_CERTIFICATE_PROD)
                    M365_CERTIFICATE_PASSWORD_PROD: $(M365_CERTIFICATE_PASSWORD_PROD)
                    M365_APP_ID_PROD: $(M365_APP_ID_PROD)
                    M365_TENANT_ID_PROD: $(M365_TENANT_ID_PROD)

                # Upload and deploy to Production App Catalog
                - script: |
                    m365 spo app add \
                      --filePath $(Pipeline.Workspace)/drop/$(packageName) \
                      --appCatalogScope tenant \
                      --overwrite
                  displayName: 'Upload to Production App Catalog'

                - script: |
                    m365 spo app deploy \
                      --name $(packageName) \
                      --appCatalogScope tenant \
                      --skipFeatureDeployment
                  displayName: 'Deploy to Production (Tenant-wide)'

                # Logout
                - script: |
                    m365 logout
                  displayName: 'Logout from M365'
                  condition: always()
